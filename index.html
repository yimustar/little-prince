<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>小王子与玫瑰</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #0a0e27 0%, #1a1a3e 40%, #2d1b69 100%);
            overflow: hidden;
            font-family: "Microsoft YaHei", sans-serif;
            color: #fff;
        }

        /* 星空 */
        .stars {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        /* 流星 */
        .shooting-star {
            position: absolute;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #fff, transparent);
            animation: shoot 3s linear infinite;
            opacity: 0;
        }

        @keyframes shoot {
            0% { transform: translateX(-100px) translateY(100px); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateX(100vw) translateY(-100px); opacity: 0; }
        }

        /* 星球 */
        .planet {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f4a460 0%, #d2691e 100%);
            box-shadow: 0 0 30px rgba(244, 164, 96, 0.5), inset -10px -10px 20px rgba(0,0,0,0.3);
            top: 15%;
            right: 10%;
            animation: float 6s ease-in-out infinite;
        }

        .planet::before {
            content: '';
            position: absolute;
            width: 120px;
            height: 120px;
            border: 2px solid rgba(244, 164, 96, 0.2);
            border-radius: 50%;
            top: -20px;
            left: -20px;
            animation: ring 8s linear infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes ring {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 月亮 */
        .moon {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fff 0%, #f0e68c 100%);
            box-shadow: 0 0 40px rgba(255, 255, 200, 0.6);
            top: 10%;
            left: 15%;
            animation: moonGlow 4s ease-in-out infinite alternate;
        }

        @keyframes moonGlow {
            from { box-shadow: 0 0 30px rgba(255, 255, 200, 0.4); }
            to { box-shadow: 0 0 60px rgba(255, 255, 200, 0.8); }
        }

        /* 内容区域 */
        .content {
            position: relative;
            z-index: 10;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 30px 20px 50px;
            text-align: center;
            overflow-y: auto;
        }

        .title {
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 200, 200, 0.5);
            opacity: 1;
        }

        .rose-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .rose {
            font-size: 60px;
            line-height: 80px;
            animation: rosePulse 2s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(255, 100, 100, 0.8));
        }

        @keyframes rosePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .story-text {
            max-width: 350px;
            font-size: 15px;
            line-height: 1.8;
            color: #e0e0e0;
            min-height: 80px;
        }

        .story-text .line {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s ease-out forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .quote {
            margin-top: 15px;
            font-size: 13px;
            color: #ffaaaa;
            font-style: italic;
            opacity: 0;
        }

        .quote.show {
            opacity: 1;
            animation: fadeInUp 1s ease-out forwards;
        }

        .btn {
            margin-top: 20px;
            padding: 14px 40px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border: none;
            border-radius: 25px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
            transition: all 0.3s;
            opacity: 1;
            animation: btnPulse 2s ease-in-out infinite;
        }

        @keyframes btnPulse {
            0%, 100% { box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4); }
            50% { box-shadow: 0 4px 25px rgba(233, 69, 96, 0.8); }
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6);
        }

        /* 花瓣飘落 */
        .petal {
            position: fixed;
            width: 12px;
            height: 12px;
            background: linear-gradient(135deg, #ff6b6b, #e94560);
            border-radius: 50% 0 50% 50%;
            opacity: 0;
            pointer-events: none;
            animation: petalFall linear forwards;
        }

        @keyframes petalFall {
            0% {
                transform: translateY(-10vh) rotate(0deg) scale(0.5);
                opacity: 0.8;
            }
            100% {
                transform: translateY(110vh) rotate(720deg) scale(1);
                opacity: 0;
            }
        }

        /* 小王子简笔画 */
        .prince {
            position: absolute;
            bottom: 10%;
            left: 10%;
            font-size: 60px;
            animation: princeFloat 4s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
        }

        @keyframes princeFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .fox {
            position: absolute;
            bottom: 15%;
            right: 10%;
            font-size: 50px;
            animation: foxFloat 5s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(255, 200, 100, 0.3));
        }

        @keyframes foxFloat {
            0%, 100% { transform: translateY(0) scaleX(1); }
            50% { transform: translateY(-10px) scaleX(1); }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="planet"></div>
    <div class="moon"></div>
    <div class="prince">🤴</div>
    <div class="fox">🦊</div>

    <div class="content">
        <div class="title">小王子与玫瑰</div>
        <div class="rose-container" onclick="showStory()">
            <div class="rose">🌹</div>
        </div>
        <div class="story-text" id="story"></div>
        <div class="quote" id="quote"></div>
        <button class="btn" id="btn" onclick="nextScene()">开始故事</button>
    </div>

    <script>
        // 生成星星
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.animationDelay = Math.random() * 2 + 's';
            star.style.width = star.style.height = (Math.random() * 2 + 1) + 'px';
            starsContainer.appendChild(star);
        }

        // 生成流星
        function createShootingStar() {
            const shooting = document.createElement('div');
            shooting.className = 'shooting-star';
            shooting.style.top = Math.random() * 50 + 'vh';
            shooting.style.left = Math.random() * 50 + 'vw';
            shooting.style.animationDelay = Math.random() * 2 + 's';
            starsContainer.appendChild(shooting);
            setTimeout(() => shooting.remove(), 4000);
        }
        setInterval(createShootingStar, 3000);

        // 故事内容
        const scenes = [
            {
                text: ['在遥远的B612星球上，', '住着一位小王子。', '他有一朵独一无二的玫瑰。'],
                quote: '"正是你为你的玫瑰花费的时间，才使得她如此重要。"'
            },
            {
                text: ['玫瑰很骄傲，', '总是用她的刺来保护自己。', '小王子不懂她的矫情，决定离开。'],
                quote: '"那时候我太小，不懂得爱她。"'
            },
            {
                text: ['他来到了地球，', '遇见了狐狸。', '狐狸教会他什么是驯养。'],
                quote: '"如果你驯养了我，我们就彼此需要了。"'
            },
            {
                text: ['狐狸告诉他，', '真正的美丽是用心才能看见的。', '眼睛是看不见的。'],
                quote: '"真正重要的东西，用眼睛是看不见的。"'
            },
            {
                text: ['小王子终于明白，', '他的玫瑰是独一无二的。', '因为他为她浇过水，为她盖过罩子。'],
                quote: '"她单独一朵，就比你们全体更重要。"'
            },
            {
                text: ['每当夜晚抬头看星星，', '他就会笑。', '因为有一颗星星上，有他的玫瑰。'],
                quote: '"如果你爱上了某个星球的一朵花，', '那么，只要在夜晚仰望星空，', '就会觉得漫天的繁星就像一朵朵盛开的花。"'
            }
        ];

        let currentScene = -1;

        function showStory() {
            nextScene();
        }

        function nextScene() {
            currentScene++;
            if (currentScene >= scenes.length) {
                currentScene = 0;
            }

            const scene = scenes[currentScene];
            const storyEl = document.getElementById('story');
            const quoteEl = document.getElementById('quote');
            const btn = document.getElementById('btn');

            // 清空并显示新文字
            storyEl.innerHTML = '';
            quoteEl.classList.remove('show');
            quoteEl.textContent = '';

            scene.text.forEach((line, i) => {
                const div = document.createElement('div');
                div.className = 'line';
                div.textContent = line;
                div.style.animationDelay = (i * 0.8) + 's';
                storyEl.appendChild(div);
            });

            // 显示名言
            setTimeout(() => {
                quoteEl.textContent = scene.quote;
                quoteEl.classList.add('show');
            }, scene.text.length * 800 + 500);

            // 更新按钮
            btn.textContent = currentScene === scenes.length - 1 ? '重新开始' : '下一章';
            btn.classList.add('show');

            // 产生花瓣
            for (let i = 0; i < 10; i++) {
                setTimeout(() => createPetal(), i * 200);
            }
        }

        function createPetal() {
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.body.appendChild(petal);
            setTimeout(() => petal.remove(), 8000);
        }

        // 初始化
        console.log('页面加载完成');

        // 页面加载后自动显示第一章
        window.onload = function() {
            setTimeout(() => nextScene(), 500);
        };
    </script>
</body>
</html>
